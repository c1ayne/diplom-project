apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator
  namespace: iot-system
spec:
  replicas: 5
  selector:
    matchLabels:
      app: generator
  template:
    metadata:
      labels:
        app: generator
    spec:
      containers:
        - name: generator
          image: diplomat/generator:k8s
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: iot-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"