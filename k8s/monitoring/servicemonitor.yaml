apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: iot-monitor
  namespace: iot-system
  labels:
    release: my-monitoring
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [bridge, consumer]
  endpoints:
    - port: http-web
      path: /actuator/prometheus
      interval: 15s