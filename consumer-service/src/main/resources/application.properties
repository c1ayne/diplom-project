spring.application.name=consumer-service

server.port=8081

spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.consumer.group-id=diplom-project-backend
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

management.endpoints.web.exposure.include=health, info, prometheus
management.metrics.tags.application=${spring.application.name:consumer-service}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:iot_data}
spring.datasource.username=${DB_USER:iot_user}
spring.datasource.password=${DB_PASS:iot_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect